            <section class="gallery-heading">
               <h2>The Archive</h2>
               <p>
                  A visual record of Persian craft, pattern, and place. Some of our favorite the images behind the stories.
               </p>
            </section>
         <section class="gallery-content">
                        <figure>
               <img src="archive1.png" alt="A round lidded Persian enamel jar covered in intricate blue floral patterns on a yellow background" />
               <figcaption>Minakari (enamel) vessel, Iran</figcaption>
            </figure>
            <figure>
               <img src="archive2.jpg" alt="Side-by-side comparison of a Persian chahar bagh carpet and a formal garden floor plan, showing the same fourfold symmetry in both" />
               <figcaption>The chahar bagh: a garden mapped in wool</figcaption>
            </figure>
            <figure>
               <img src="archive3.jpg" alt="A framed Persian nastaliq calligraphy piece with flowing black script on cream paper, bordered by floral illumination" />
               <figcaption>Nastaliq calligraphy, ink on paper</figcaption>
            </figure>
            <figure>
               <img src="archive4.jpg" alt="Close-up of a Persian khatam marquetry surface with densely packed geometric star patterns in gold, teal, and red" />
               <figcaption>Khatam marquetry detail, Isfahan</figcaption>
            </figure>
            <figure>
               <img src="archive5.jpg" alt="Ornate stained glass orosi windows filling an arched doorway with colorful floral and geometric patterns, with a plaster ceiling above" />
               <figcaption>Orosi stained glass windows, Kashan</figcaption>
            </figure>
            <figure>
               <img src="archive6.jpg" alt="Three nomadic women in vibrant traditional dress spinning wool inside a tent hung with handwoven kilim textiles" />
               <figcaption>Nomadic women spinning wool, Iran</figcaption>
            </figure>
            <figure>
               <img src="archive7.jpg" alt="Looking up into the tiled muqarnas dome of the Kashan Grand Bazaar, with turquoise geometric vaulting and a circular skylight above a bustling market floor" />
               <figcaption>Grand Bazaar dome, Kashan</figcaption>
            </figure>
            <figure>
               <img src="archive8.jpg" alt="A Persian miniature painting showing a seated ruler surrounded by courtiers, set within a gold floral illuminated border on a blue mount" />
               <figcaption>Persian miniature, court scene, 16th century</figcaption>
            </figure>
